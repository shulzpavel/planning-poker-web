name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run test
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t planning-poker-web .

  deploy:
    name: Deploy web to production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, docker]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          command_timeout: 20m
          script: |
            set -euo pipefail
            cd /opt/planning-poker-dev
            export DEPLOY_TRIGGER="github:${{ github.repository }}@${{ github.sha }}"
            ./infra/deploy/deploy-service-prod.sh web
