name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  notify-start:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: shulzpavel/planning-poker-dev/.github/workflows/ci-notify-start.yml@main
    with:
      service_label: web
    secrets:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run test
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t planning-poker-web .

  deploy:
    name: Deploy web to production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, docker]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          command_timeout: 20m
          script: |
            set -euo pipefail
            cd /opt/planning-poker-dev
            export DEPLOY_TRIGGER="github:${{ github.repository }}@${{ github.sha }}"
            ./infra/deploy/deploy-service-prod.sh web

  notify-result:
    if: always() && !cancelled()
    needs: [test, docker, deploy]
    uses: shulzpavel/planning-poker-dev/.github/workflows/ci-notify-result.yml@main
    with:
      service_label: web
      test_result: ${{ needs.test.result }}
      docker_result: ${{ needs.docker.result }}
      deploy_result: ${{ needs.deploy.result }}
      notify_on_success: true
    secrets:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
